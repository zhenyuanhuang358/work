  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">第5章：零样本/少样本效果对比</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5f6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">不同样本数量对输出风格一致性的影响</tspan></text>
  <line x1="600" y1="220" x2="600" y2="588" stroke="#c9c4b8" stroke-width="2"/>
  <line x1="86" y1="406" x2="1114" y2="406" stroke="#c9c4b8" stroke-width="2"/>
  <rect x="104.0" y="236.0" width="472.0" height="142.0" rx="8" fill="#f7f5ee" stroke="#1f4e79" stroke-width="1.4" filter="url(#soft-shadow)"/>
