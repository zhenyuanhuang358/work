  <circle cx="130.0" cy="264.0" r="15" fill="#1f4e79"/>
  <text x="130.0" y="269.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="130.0" dy="0">1</tspan></text>
  <text x="156.0" y="269.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="156.0" dy="0">Quadrant 1</tspan></text>
  <text x="126.0" y="350.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="126.0" dy="0">依赖模型默认风格，适合通用任务</tspan></text>
  <rect x="624.0" y="236.0" width="472.0" height="142.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="650.0" cy="264.0" r="15" fill="#1f4e79"/>
  <text x="650.0" y="269.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="650.0" dy="0">2</tspan></text>
  <text x="676.0" y="269.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="676.0" dy="0">Quadrant 2</tspan></text>
  <text x="646.0" y="350.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="646.0" dy="0">建立基本风格参考，适合简单格式任务</tspan></text>
  <rect x="104.0" y="424.0" width="472.0" height="142.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="130.0" cy="452.0" r="15" fill="#1f4e79"/>
  <text x="130.0" y="457.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="130.0" dy="0">3</tspan></text>
  <text x="156.0" y="457.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="156.0" dy="0">Quadrant 3</tspan></text>
  <text x="126.0" y="538.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="126.0" dy="0">风格一致性高，最推荐的默认选择</tspan></text>
  <rect x="624.0" y="424.0" width="472.0" height="142.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="650.0" cy="452.0" r="15" fill="#1f4e79"/>
  <text x="650.0" y="457.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="650.0" dy="0">4</tspan></text>
  <text x="676.0" y="457.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="676.0" dy="0">Quadrant 4</tspan></text>
  <text x="646.0" y="538.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="646.0" dy="0">边际效益递减，消耗大量上下文</tspan></text>
