  <circle cx="978.3" cy="362.0" r="15" fill="#1f4e79"/>
  <text x="978.3" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="978.3" dy="0">6</tspan></text>
  <text x="1004.3" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="1004.3" dy="0">最终答案</tspan></text>
  <text x="974.3" y="454.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="974.3" dy="0">基于完整推理得出结论</tspan></text>
