name: Fetch Research Data

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers, e.g. 02255.HK,600519.SS,9988.HK'
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - research_fetch_trigger.json

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas -q

      - name: Resolve tickers
        id: tickers
        run: |
          TICKERS="${{ github.event.inputs.tickers }}"
          if [ -z "$TICKERS" ] && [ -f research_fetch_trigger.json ]; then
            TICKERS=$(python3 -c "
import json
d = json.load(open('research_fetch_trigger.json'))
print(','.join(d.get('tickers', [])))
")
          fi
          echo "list=$TICKERS" >> $GITHUB_OUTPUT
          echo "Tickers: $TICKERS"

      - name: Fetch financial data
        run: python3 scripts/fetch_research_data.py "${{ steps.tickers.outputs.list }}"

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research_cache/
          git diff --cached --quiet && echo "nothing to commit" || \
            git commit -m "chore: update research cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
