  <text x="661.0" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="661.0" dy="0">步骤二</tspan></text>
  <text x="631.0" y="454.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="631.0" dy="0">基于步骤一继续推进</tspan></text>
  <line x1="942.3" y1="408.0" x2="944.3" y2="408.0" stroke="#1f4e79" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
