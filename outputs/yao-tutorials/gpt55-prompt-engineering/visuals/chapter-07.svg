<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="第7章：提示词迭代四步循环" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
