name: Fetch Stock Prices

on:
  schedule:
    # Every 5 minutes Mon–Fri 13:30–21:05 UTC (= 9:30am–5:05pm ET)
    - cron: '*/5 13-21 * * 1-5'
  push:
    branches: [main]
    paths:
      - price_fetch_trigger.txt
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests -q

      - name: Fetch prices
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python3 scripts/fetch_prices.py

      - name: Commit stock_prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add stock_prices.json
          git diff --cached --quiet && echo "nothing to commit" || \
            git commit -m "chore: refresh stock prices $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
