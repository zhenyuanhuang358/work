  <text x="832.7" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="832.7" dy="0">步骤N</tspan></text>
  <text x="802.7" y="454.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="802.7" dy="0">完成所有推理步骤</tspan></text>
  <rect x="952.3" y="334.0" width="153.7" height="148.0" rx="8" fill="#f7f5ee" stroke="#1f4e79" stroke-width="1.4" filter="url(#soft-shadow)"/>
